<!DOCTYPE html>
<html>
<head>
<title>Signup</title>

<style>

body{
font-family:Arial;
background:#f5f5f7;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
background:#0071e3;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
}

a{
display:block;
margin-top:10px;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}

<a href="/login/">Already have an account?</a>

</div>

</body>
</html>
