<!DOCTYPE html>
<html>
<head>
<title>Student Profile</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
animation:fadeIn 0.5s ease;
}

h2{
margin-top:0;
text-align:center;
}

label{
font-weight:600;
}

input, select{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#0071e3;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#005bb5;
}

.saved{
margin-top:20px;
padding:12px;
background:#e8f7e8;
color:#0a7a0a;
border-radius:10px;
text-align:center;
animation:pop 0.4s ease;
}

@keyframes pop{
from{opacity:0; transform:scale(0.8);}
to{opacity:1; transform:scale(1);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.redirect{
margin-top:10px;
font-size:13px;
color:#555;
}

</style>
</head>

<body>

<div class="card">

<h2>Student Profile</h2>

<form method="POST">
{% csrf_token %}

<label>Grade</label>
<select name="grade">
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
<option>Class 9</option>
<option>Class 10</option>
<option>Class 11</option>
<option>Class 12</option>
</select>

<label>School</label>
<input type="text" name="school" placeholder="Enter school name">

<h3>Coding Profiles</h3>

<input type="text" name="github" placeholder="GitHub username">

<input type="text" name="leetcode" placeholder="LeetCode username">

<input type="text" name="codechef" placeholder="CodeChef username">

<input type="text" name="hackerrank" placeholder="HackerRank username">

<button type="submit">Save Profile</button>

</form>

{% if saved %}

<div class="saved">
✅ Changes saved successfully!
<div class="redirect">
Redirecting to homepage in <span id="count">3</span> seconds...
</div>
</div>

<script>

let count = 3;

setInterval(function(){

count--;

document.getElementById("count").innerText = count;

if(count === 0){
window.location.href = "/";
}

},1000);

</script>

{% endif %}

</div>

<h2>Your Career Goal</h2>

{% if profile.target_company %}

<div class="card">

<p><strong>Target Company:</strong> {{ profile.target_company }}</p>

<p><strong>Target Role:</strong> {{ profile.target_role }}</p>

</div>

{% endif %}

</body>
</html>
