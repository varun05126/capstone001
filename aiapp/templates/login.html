<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:#f5f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:40px;
border-radius:18px;
width:360px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
text-align:center;
animation:fadeIn 0.5s ease;
}

h2{
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:16px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#0071e3;
color:white;
font-size:15px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
background:#005bb5;
}

.redirect-msg{
margin-top:15px;
padding:10px;
background:#e8f7e8;
color:#0a7a0a;
border-radius:10px;
display:none;
}

.loader{
margin-top:10px;
border:3px solid #eee;
border-top:3px solid #0071e3;
border-radius:50%;
width:20px;
height:20px;
animation:spin 1s linear infinite;
display:inline-block;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

</style>

</head>

<body>

<div class="card">

<h2>Login</h2>

<form method="post" onsubmit="showRedirect()">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
<a href="/signup/">Create Account</a>
</form>

<div id="redirectMsg" class="redirect-msg">
Login successful! Redirecting to your profile...
<br>
<span class="loader"></span>
</div>

</div>

<script>

function showRedirect(){

document.getElementById("redirectMsg").style.display="block";

}

</script>

</body>
</html>
